<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — CollectibleFind</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--green:#1B4332;--green-mid:#2D6A4F;--green-dark:#122B21;--gold:#B8872A;--gold-mid:#C89830;--ivory:#F7F3EC;--paper:#FDFAF5;--paper-border:#E2D9C8;--ink:#1A1208;--muted:#8C7B5E;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--green-dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--paper);border:1.5px solid var(--paper-border);border-radius:8px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--green);margin-bottom:4px;}
.login-logo span{color:var(--gold);}
.login-subtitle{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:32px;}
.lock-icon{font-size:2.8rem;margin-bottom:20px;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:6px;}
.login-desc{font-size:.82rem;color:var(--muted);margin-bottom:28px;line-height:1.6;}
.form-group{margin-bottom:14px;text-align:left;}
.form-label{display:block;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--green);margin-bottom:6px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--paper-border);border-radius:4px;font-size:.9rem;font-family:'Barlow',sans-serif;color:var(--ink);background:white;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,135,42,.1);}
.login-btn{width:100%;background:var(--green);color:white;font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;padding:13px;border-radius:4px;border:none;cursor:pointer;margin-top:8px;transition:all .18s;}
.login-btn:hover{background:var(--green-mid);}
.error-msg{display:none;background:#FEE2E2;color:#991B1B;border-radius:4px;padding:10px 14px;font-size:.82rem;margin-top:12px;}
.hint{font-size:.72rem;color:var(--muted);margin-top:16px;}
.back-link{display:inline-block;margin-top:20px;font-size:.8rem;color:rgba(247,243,236,.5);text-decoration:none;transition:color .15s;}
.back-link:hover{color:var(--gold);}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">Collectible<span>Find</span></div>
  <div class="login-subtitle">Content Management System</div>
  <div class="lock-icon">🔐</div>
  <div class="login-title">Admin Access</div>
  <div class="login-desc">Sign in to manage your influencer directory, blog posts, resources, and site settings.</div>

  <div class="form-group">
    <label class="form-label">Username</label>
    <input type="text" class="form-input" id="adminUser" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="username">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" class="form-input" id="adminPass" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password">
  </div>
  <button class="login-btn" onclick="doLogin()">Sign In →</button>
  <div class="error-msg" id="error-msg">Incorrect username or password. Try again.</div>
  <div class="hint">Default credentials: admin / collectible2025</div>
</div>

<a href="index.html" class="back-link">← Back to CollectibleFind Directory</a>

<script>
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'collectible2025';

function doLogin() {
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  const err = document.getElementById('error-msg');

  if(u === ADMIN_USER && p === ADMIN_PASS) {
    // Store auth and redirect to index.html with admin panel open
    sessionStorage.setItem('cf_admin_auth', 'true');
    window.location.href = 'index.html#admin';
  } else {
    err.style.display = 'block';
    document.getElementById('adminPass').value = '';
    document.getElementById('adminPass').focus();
  }
}

// If already authenticated, go straight to admin
if(sessionStorage.getItem('cf_admin_auth') === 'true') {
  window.location.href = 'index.html#admin';
}
</script>
</body>
</html>
